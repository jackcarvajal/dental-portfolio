# ============================================================
# PRODIGY — CI/CD: Auto-deploy a GitHub Pages
# Dispara en cada push a main → minifica CSS → publica sitio
# ============================================================

name: Deploy PRODIGY

on:
  push:
    branches: [main]
  workflow_dispatch:           # botón manual en GitHub → Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false    # espera a que termine el deploy anterior

jobs:
  # ── Job 0: Validaciones rápidas antes de desplegar ──────────────
  validate:
    name: Validar integridad
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archivos críticos presentes
        run: |
          for f in index.html flujo-impresion.html flujo-fresado.html \
                   seguimiento-caso.html app/admin-precios.html \
                   js/flujo-impresion.js js/supabase-client.js; do
            [ -f "$f" ] && echo "OK: $f" || { echo "FALTA: $f"; exit 1; }
          done

      - name: Sin imports de supabase-mock en producción
        run: |
          if grep -l "supabase-mock" flujo-impresion.html flujo-fresado.html \
              seguimiento-caso.html 2>/dev/null | grep .; then
            echo "ERROR: supabase-mock encontrado en archivo de producción"; exit 1
          fi
          echo "OK: sin referencias a mock"

      - name: Migraciones SQL presentes
        run: |
          for f in sql/migrate-catalogo-completo.sql \
                   sql/migrate-seguimiento-rpc-v2.sql \
                   sql/migrate-leads.sql; do
            [ -f "$f" ] && echo "OK: $f" || echo "WARN: falta $f (no bloquea deploy)"
          done

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1 — Clonar el repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2 — Node para ESLint + minify.js (sin npm install en producción extra)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3 — ESLint: abortar si hay error de sintaxis o variable no definida
      - name: Lint JS crítico
        run: |
          npm install --save-dev eslint 2>/dev/null
          npm run lint || { echo "LINT FAILED — corrige errores antes de deploy"; exit 1; }

      # 4 — Regenerar .min.css en caso de que global-nav.css haya cambiado
      - name: Minificar CSS
        run: node minify.js

      # 4 — Configurar GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 5 — Subir todo el repositorio como artefacto de Pages
      #     (excluye carpetas que ya están en .gitignore)
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # 6 — Publicar en GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 7 — Sincronizar a prodigy-web (Vercel → prodigylabdental.com)
      - name: Push a prodigy-web/principal
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add prodigy-web https://x-access-token:${{ secrets.PRODIGY_WEB_TOKEN }}@github.com/jackcarvajal/prodigy-web.git
          git push prodigy-web HEAD:principal --force
