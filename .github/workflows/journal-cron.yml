# ============================================================
# PRODIGY — Auto-Journal
# Motor: Google Gemini 2.0 Flash (gratuito)
# Imágenes: Wikipedia REST API (gratuito, sin key)
# Cron: martes y jueves 9:00 AM Bogotá (14:00 UTC)
# Social copy: GitHub Actions Artifact (privado, solo tú)
# ============================================================

name: ProDigy Auto-Journal

on:
  schedule:
    - cron: '0 14 * * 2'   # Martes 9 AM Bogotá
    - cron: '0 14 * * 4'   # Jueves 9 AM Bogotá
  workflow_dispatch:        # Ejecución manual desde GitHub Actions

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar artículos (Gemini + Wikipedia)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/auto-journal.js

      - name: Verificar cambios en articles.js
        id: changes
        run: |
          git diff --quiet articles.js && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit y push artículos nuevos
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "ProDigy Journal Bot"
          git config user.email "bot@prodigylabdental.com"
          git add articles.js
          git commit -m "feat(journal): $(date +'%Y-%m-%d') — 2 artículos técnicos auto-generados [skip ci]"
          git push

      # Social copy → Artifact privado (solo visible en GitHub Actions)
      - name: Subir social copy como Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: social-copy-${{ github.run_id }}
          path: marketing-social.txt
          retention-days: 30

      - name: Resumen del job
        if: always()
        run: |
          echo "## 📰 ProDigy Auto-Journal" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fecha:** $(date +'%d/%m/%Y %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Motor:** Google Gemini 2.0 Flash (gratuito)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artículos generados" >> $GITHUB_STEP_SUMMARY
          if [ -f articles.js ]; then
            grep '"titulo"' articles.js | head -2 | sed 's/.*"titulo": "\(.*\)".*/- \1/' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Textos para redes sociales" >> $GITHUB_STEP_SUMMARY
          echo "📎 Ver Artifact **social-copy-${{ github.run_id }}** en esta página." >> $GITHUB_STEP_SUMMARY
