<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Staff — PRODIGY</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050505;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      background: #0d1520;
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 1rem; }
    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #D4AF37;
      margin-bottom: 0.3rem;
    }
    .sub { font-size: 0.78rem; color: #475569; margin-bottom: 2rem; }
    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      outline: none;
      text-align: center;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    input:focus { border-color: rgba(212,175,55,0.5); }
    button {
      width: 100%;
      background: linear-gradient(135deg, #D4AF37, #D946A6);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 0.95rem;
      font-weight: 800;
      padding: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .error {
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 0.75rem;
      display: none;
    }
    .salir {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #334155;
    }
    .salir a { color: #475569; text-decoration: none; }
    .salir a:hover { color: #D4AF37; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">💎</div>
    <h1>PRODIGY STAFF</h1>
    <p class="sub">Vista interna — no compartir esta URL</p>

    <input type="password" id="pwd" placeholder="Contraseña" autofocus
           onkeydown="if(event.key==='Enter') acceder()">
    <button onclick="acceder()">Ingresar al sitio real</button>
    <p class="error" id="err">Contraseña incorrecta</p>

    <div class="salir">
      <a href="/coming-soon.html">← Ver página pública</a>
      &nbsp;·&nbsp;
      <a href="#" onclick="salir()">Cerrar acceso staff</a>
    </div>
  </div>

  <script>
    // Si ya tiene acceso, redirigir directo
    if (document.cookie.includes('prodigy_preview')) {
      window.location.href = '/';
    }

    function acceder() {
      const pwd = document.getElementById('pwd').value;
      // Contraseña: prodigy2026
      if (pwd === 'prodigy2026') {
        // Cookie válida por 365 días
        document.cookie = 'prodigy_preview=1; path=/; max-age=31536000; SameSite=Lax';
        window.location.href = '/';
      } else {
        document.getElementById('err').style.display = 'block';
        document.getElementById('pwd').value = '';
        document.getElementById('pwd').focus();
      }
    }

    function salir() {
      document.cookie = 'prodigy_preview=; path=/; max-age=0';
      window.location.href = '/';
    }
  </script>
</body>
</html>
