<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de Caso - PRODIGY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="images/logo-prodigy.png" alt="PRODIGY Logo" style="height:45px;">
            </a>
        </div>
    </nav>

    <div style="padding:120px 20px 80px;max-width:900px;margin:0 auto;">
        <div style="text-align:center;margin-bottom:50px;">
            <div style="font-size:4rem;margin-bottom:20px;">🔍</div>
            <h1 style="font-size:2.5rem;background:linear-gradient(135deg,#ff6b35,#f7931e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:15px;">Seguimiento de Tu Caso</h1>
            <p style="font-size:1.1rem;color:rgba(248,250,252,0.8);">Consulta el estado actual de tu caso en tiempo real</p>
        </div>

        <!-- Formulario de búsqueda -->
        <div style="background:var(--card-bg);border:1px solid var(--border-subtle);border-radius:20px;padding:40px;margin-bottom:30px;">
            <h2 style="color:#ff6b35;margin-bottom:25px;">Buscar Caso</h2>
            <form id="searchForm" style="display:grid;gap:20px;">
                <div>
                    <label style="display:block;color:rgba(248,250,252,0.9);margin-bottom:8px;font-weight:600;">Código del Caso o Nombre del Paciente</label>
                    <input type="text" id="searchQuery" placeholder="Ej: PRODIGY-1234567890 o María López" style="width:100%;padding:15px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,107,53,0.3);border-radius:10px;color:white;font-size:1rem;">
                </div>
                <button type="submit" style="padding:15px;background:linear-gradient(135deg,#ff6b35,#f7931e);color:white;border:none;border-radius:50px;font-size:1.1rem;font-weight:600;cursor:pointer;">
                    <i class="fas fa-search"></i> Buscar
                </button>
            </form>
        </div>

        <!-- Resultado -->
        <div id="result" style="display:none;">
            <!-- Estado del Caso -->
            <div style="background:var(--card-bg);border:1px solid var(--border-subtle);border-radius:20px;padding:40px;margin-bottom:30px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;flex-wrap:wrap;gap:20px;">
                    <div>
                        <h2 style="color:#ff6b35;margin-bottom:5px;" id="caseName">Caso de María López</h2>
                        <p style="color:rgba(248,250,252,0.7);font-size:0.9rem;" id="caseId">PRODIGY-1234567890</p>
                    </div>
                    <div id="statusBadge" style="padding:12px 25px;border-radius:25px;font-weight:700;font-size:1rem;">
                        <!-- Se llena con JS -->
                    </div>
                </div>

                <!-- Timeline de Estados -->
                <div id="timeline" style="position:relative;padding-left:40px;">
                    <!-- Se llena con JS -->
                </div>
            </div>

            <!-- Detalles del Caso -->
            <div style="background:var(--card-bg);border:1px solid var(--border-subtle);border-radius:20px;padding:40px;">
                <h3 style="color:#ff6b35;margin-bottom:25px;">📋 Detalles del Caso</h3>
                <div id="caseDetails" style="display:grid;gap:15px;">
                    <!-- Se llena con JS -->
                </div>
            </div>
        </div>

        <!-- No encontrado -->
        <div id="notFound" style="display:none;text-align:center;padding:60px 40px;background:rgba(244,67,54,0.1);border:2px solid rgba(244,67,54,0.3);border-radius:20px;">
            <div style="font-size:4rem;margin-bottom:20px;">❌</div>
            <h3 style="color:#f44336;margin-bottom:15px;">Caso No Encontrado</h3>
            <p style="color:rgba(248,250,252,0.8);margin-bottom:25px;">Verifica el código o nombre del paciente e intenta nuevamente.</p>
            <button onclick="location.reload()" style="padding:12px 30px;background:linear-gradient(135deg,#ff6b35,#f7931e);color:white;border:none;border-radius:30px;font-weight:600;cursor:pointer;">
                Buscar Otro Caso
            </button>
        </div>
    </div>

    <script>
        // Estados posibles
        const STATES = {
            pending_upload: {
                name: 'Pendiente de Archivos',
                color: '#FFC107',
                bg: 'rgba(255,193,7,0.15)',
                icon: '⏳',
                description: 'Esperando que subas los archivos'
            },
            received: {
                name: 'Archivos Recibidos',
                color: '#2196F3',
                bg: 'rgba(33,150,243,0.15)',
                icon: '📥',
                description: 'Archivos recibidos correctamente'
            },
            reviewing: {
                name: 'En Revisión',
                color: '#9C27B0',
                bg: 'rgba(156,39,176,0.15)',
                icon: '🔍',
                description: 'Revisando archivos y orden de trabajo'
            },
            incomplete: {
                name: 'Información Incompleta',
                color: '#FF5722',
                bg: 'rgba(255,87,34,0.15)',
                icon: '⚠️',
                description: 'Faltan archivos o información'
            },
            in_design: {
                name: 'En Diseño',
                color: '#00BCD4',
                bg: 'rgba(0,188,212,0.15)',
                icon: '🎨',
                description: 'Diseñando tu caso'
            },
            in_production: {
                name: 'En Producción',
                color: '#4CAF50',
                bg: 'rgba(76,175,80,0.15)',
                icon: '⚙️',
                description: 'Caso en producción'
            },
            quality_check: {
                name: 'Control de Calidad',
                color: '#3F51B5',
                bg: 'rgba(63,81,181,0.15)',
                icon: '✓',
                description: 'Verificando calidad'
            },
            ready: {
                name: 'Listo para Entrega',
                color: '#4CAF50',
                bg: 'rgba(76,175,80,0.15)',
                icon: '✅',
                description: 'Caso completado y listo'
            },
            delivered: {
                name: 'Entregado',
                color: '#4CAF50',
                bg: 'rgba(76,175,80,0.15)',
                icon: '🎉',
                description: 'Caso entregado exitosamente'
            },
            on_hold: {
                name: 'En Espera',
                color: '#FF9800',
                bg: 'rgba(255,152,0,0.15)',
                icon: '⏸️',
                description: 'Caso pausado temporalmente'
            }
        };

        // Base de datos de ejemplo (en producción esto vendría de tu sistema)
        const casesDB = {
            'PRODIGY-1234567890': {
                id: 'PRODIGY-1234567890',
                patientName: 'María López',
                doctorName: 'Dr. Carlos Pérez',
                workType: 'Corona sobre Implante',
                material: 'Zirconia',
                shade: 'A2',
                deliveryDate: '2025-01-30',
                currentStatus: 'in_design',
                timeline: [
                    { status: 'pending_upload', date: '2025-01-23 10:00', note: 'Caso registrado' },
                    { status: 'received', date: '2025-01-23 10:30', note: 'Archivos recibidos correctamente' },
                    { status: 'reviewing', date: '2025-01-23 11:00', note: 'Revisión iniciada' },
                    { status: 'in_design', date: '2025-01-23 14:00', note: 'Diseño en proceso - Técnico: Juan' }
                ],
                notes: 'Cliente solicita perfil de emergencia natural'
            }
        };

        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const query = document.getElementById('searchQuery').value.trim().toUpperCase();
            
            // Buscar en la base de datos
            let found = null;
            for (let id in casesDB) {
                const caso = casesDB[id];
                if (caso.id.includes(query) || caso.patientName.toUpperCase().includes(query)) {
                    found = caso;
                    break;
                }
            }

            if (found) {
                showCase(found);
            } else {
                document.getElementById('result').style.display = 'none';
                document.getElementById('notFound').style.display = 'block';
            }
        });

        function showCase(caso) {
            document.getElementById('notFound').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            
            // Actualizar información básica
            document.getElementById('caseName').textContent = `Caso de ${caso.patientName}`;
            document.getElementById('caseId').textContent = caso.id;
            
            // Badge de estado actual
            const state = STATES[caso.currentStatus];
            const badge = document.getElementById('statusBadge');
            badge.style.background = state.bg;
            badge.style.color = state.color;
            badge.style.border = `2px solid ${state.color}`;
            badge.innerHTML = `${state.icon} ${state.name}`;
            
            // Timeline
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = caso.timeline.map((item, index) => {
                const itemState = STATES[item.status];
                const isLast = index === caso.timeline.length - 1;
                
                return `
                    <div style="position:relative;margin-bottom:${isLast ? '0' : '30px'};">
                        ${!isLast ? `<div style="position:absolute;left:-28px;top:35px;width:2px;height:calc(100% + 30px);background:rgba(255,107,53,0.3);"></div>` : ''}
                        <div style="position:absolute;left:-40px;top:5px;width:24px;height:24px;border-radius:50%;background:${itemState.color};display:flex;align-items:center;justify-content:center;font-size:0.8rem;">
                            ${itemState.icon}
                        </div>
                        <div style="background:${itemState.bg};border-left:3px solid ${itemState.color};padding:15px 20px;border-radius:10px;">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
                                <strong style="color:${itemState.color};">${itemState.name}</strong>
                                <span style="color:rgba(248,250,252,0.6);font-size:0.85rem;">${formatDate(item.date)}</span>
                            </div>
                            <p style="color:rgba(248,250,252,0.8);font-size:0.9rem;margin:0;">${item.note}</p>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Detalles
            document.getElementById('caseDetails').innerHTML = `
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;">
                    <div>
                        <p style="color:rgba(248,250,252,0.6);font-size:0.85rem;margin-bottom:5px;">Doctor/Clínica</p>
                        <p style="color:white;font-weight:600;">${caso.doctorName}</p>
                    </div>
                    <div>
                        <p style="color:rgba(248,250,252,0.6);font-size:0.85rem;margin-bottom:5px;">Tipo de Trabajo</p>
                        <p style="color:white;font-weight:600;">${caso.workType}</p>
                    </div>
                    <div>
                        <p style="color:rgba(248,250,252,0.6);font-size:0.85rem;margin-bottom:5px;">Material</p>
                        <p style="color:white;font-weight:600;">${caso.material}</p>
                    </div>
                    <div>
                        <p style="color:rgba(248,250,252,0.6);font-size:0.85rem;margin-bottom:5px;">Color</p>
                        <p style="color:white;font-weight:600;">${caso.shade}</p>
                    </div>
                    <div>
                        <p style="color:rgba(248,250,252,0.6);font-size:0.85rem;margin-bottom:5px;">Fecha de Entrega</p>
                        <p style="color:white;font-weight:600;">${formatDate(caso.deliveryDate, true)}</p>
                    </div>
                </div>
                ${caso.notes ? `
                    <div style="background:rgba(33,150,243,0.1);border-left:3px solid #2196F3;padding:15px;border-radius:8px;margin-top:15px;">
                        <p style="color:#2196F3;font-weight:600;margin-bottom:8px;">📝 Notas:</p>
                        <p style="color:rgba(248,250,252,0.9);">${caso.notes}</p>
                    </div>
                ` : ''}
            `;
        }

        function formatDate(dateStr, dateOnly = false) {
            const date = new Date(dateStr);
            const options = dateOnly ? 
                { year: 'numeric', month: 'long', day: 'numeric' } :
                { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            return date.toLocaleDateString('es-ES', options);
        }
    </script>
</body>
</html>
