<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>PRODIGY — En construcción</title>
  <meta name="theme-color" content="#050505">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050505;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 20px;
      overflow: hidden;
    }

    /* Fondo animado */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(217,70,166,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 70%, rgba(0,210,255,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 640px;
      width: 100%;
    }

    /* Logo */
    .logo {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 6px;
      color: #D4AF37;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .tagline {
      font-size: 0.7rem;
      letter-spacing: 4px;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    /* Icono central */
    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(217,70,166,0.08);
      border: 1px solid rgba(217,70,166,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      font-size: 2rem;
      color: #D946A6;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(217,70,166,0.2); }
      50%       { box-shadow: 0 0 0 16px rgba(217,70,166,0); }
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #f1f5f9;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    p {
      font-size: 1rem;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* Barra de progreso decorativa */
    .progress-wrap {
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      height: 6px;
      width: 100%;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #D946A6, #D4AF37);
      width: 0%;
      animation: fillBar 3s ease-out 0.5s forwards;
    }
    @keyframes fillBar {
      to { width: 80%; }
    }
    .progress-label {
      font-size: 0.72rem;
      color: #475569;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    /* CTAs */
    .ctas {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .btn-wa {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(37,211,102,0.12);
      border: 1px solid rgba(37,211,102,0.4);
      color: #25D366;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: .5px;
      transition: background .25s;
    }
    .btn-wa:hover { background: rgba(37,211,102,0.22); }

    .btn-mail {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,175,55,0.08);
      border: 1px solid rgba(212,175,55,0.3);
      color: #D4AF37;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: .5px;
      transition: background .25s;
    }
    .btn-mail:hover { background: rgba(212,175,55,0.18); }

    /* Social */
    .social {
      display: flex;
      gap: 14px;
      justify-content: center;
    }
    .social a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      color: #64748b;
      font-size: 1rem;
      text-decoration: none;
      transition: background .25s, color .25s;
    }
    .social a:hover { background: rgba(212,175,55,0.14); color: #D4AF37; }

    /* Admin bypass link — solo visible si se sabe la URL */
    .admin-link {
      position: fixed;
      bottom: 16px;
      right: 20px;
      font-size: 0.65rem;
      color: #1e293b;
      text-decoration: none;
      letter-spacing: 1px;
    }
    .admin-link:hover { color: #475569; }

    @media (max-width: 480px) {
      .logo { font-size: 1.8rem; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">PRODIGY</div>
    <div class="tagline">Digital Dental Excellence</div>

    <div class="icon-wrap">
      <i class="fas fa-tooth"></i>
    </div>

    <h1>Estamos perfeccionando cada detalle</h1>
    <p>
      Nuestro portal estará disponible muy pronto.<br>
      Mientras tanto, puedes contactarnos directamente —<br>
      seguimos operando con plena capacidad.
    </p>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
    <div class="progress-label">Lanzamiento próximo</div>

    <div class="ctas">
      <a href="https://wa.me/573212816716?text=Hola%20PRODIGY%2C%20vi%20que%20la%20web%20est%C3%A1%20en%20mantenimiento.%20%C2%BFC%C3%B3mo%20puedo%20hacer%20un%20pedido%3F"
         class="btn-wa" target="_blank" rel="noopener">
        <i class="fab fa-whatsapp"></i> WhatsApp Directo
      </a>
      <a href="mailto:labdentalprodigy@gmail.com" class="btn-mail">
        <i class="far fa-envelope"></i> Enviar Email
      </a>
    </div>

    <div class="social">
      <a href="https://www.instagram.com/labdentalprodigy/" target="_blank" rel="noopener" title="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="https://wa.me/573212816716" target="_blank" rel="noopener" title="WhatsApp">
        <i class="fab fa-whatsapp"></i>
      </a>
    </div>
  </div>

  <!-- Enlace admin oculto: /mantenimiento.html?bypass=1 te redirige al index -->
  <a href="/" class="admin-link" id="admin-bypass" style="display:none;">staff →</a>

  <script>
    // Si ?bypass=1 → ir al index real (para staff durante mantenimiento)
    if(new URLSearchParams(location.search).get('bypass') === '1') {
      document.getElementById('admin-bypass').style.display = 'block';
    }
  </script>
</body>
</html>
