<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>💎 PRODIGY — Gestionar Casos</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../js/auth-guard.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --gold:#D4AF37; --magenta:#D946A6; --bg:#050505;
            --card:#0d1117; --border:rgba(212,175,55,.2);
            --text:#f5f5f7; --muted:#94a3b8;
            --green:#22c55e; --red:#ef4444;
        }
        body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; padding:0 0 60px; visibility:hidden; }

        header {
            background:linear-gradient(135deg,#0d1117,#1a2332);
            border-bottom:1px solid var(--border);
            padding:20px 24px;
            display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
        }
        header h1 { font-size:1.4rem; font-weight:700; }
        header h1 span { color:var(--magenta); }
        .back-link { color:var(--muted); text-decoration:none; font-size:.9rem; display:flex; align-items:center; gap:6px; }
        .back-link:hover { color:var(--gold); }

        .toolbar {
            max-width:1200px; margin:24px auto 0; padding:0 20px;
            display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
        }
        .count-badge { background:var(--card); border:1px solid var(--border); padding:6px 14px; border-radius:20px; font-size:.85rem; color:var(--muted); }
        .count-badge strong { color:var(--gold); }
        .filter-toggle { display:flex; gap:8px; }
        .ftbtn {
            padding:6px 16px; border-radius:20px; border:1px solid var(--border);
            background:transparent; color:var(--muted); cursor:pointer; font-size:.85rem; transition:all .2s;
        }
        .ftbtn.active { border-color:var(--magenta); background:rgba(217,70,166,.15); color:var(--text); }

        .grid {
            max-width:1200px; margin:20px auto; padding:0 20px;
            display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px;
        }

        .caso-card {
            background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden;
            display:flex; flex-direction:column; transition:border-color .2s;
        }
        .caso-card.oculto { opacity:.55; border-color:#333; }
        .caso-card:hover { border-color:var(--gold); }

        .caso-img {
            width:100%; height:170px; object-fit:cover; display:block;
            background:#111;
        }
        .caso-img-placeholder {
            width:100%; height:170px; display:flex; align-items:center; justify-content:center;
            background:linear-gradient(135deg,#0a0a0a,#1a1a1a); color:#333; font-size:2.5rem;
        }

        .caso-body { padding:14px; flex:1; display:flex; flex-direction:column; gap:8px; }
        .caso-name { font-size:1rem; font-weight:600; line-height:1.3; }
        .caso-meta { display:flex; gap:8px; flex-wrap:wrap; }
        .badge {
            font-size:.72rem; padding:3px 9px; border-radius:12px; font-weight:600;
            background:rgba(212,175,55,.12); color:var(--gold); border:1px solid rgba(212,175,55,.25);
        }
        .badge.visible { background:rgba(34,197,94,.12); color:var(--green); border-color:rgba(34,197,94,.3); }
        .badge.oculto { background:rgba(239,68,68,.12); color:var(--red); border-color:rgba(239,68,68,.3); }
        .caso-desc { font-size:.82rem; color:var(--muted); line-height:1.45; flex:1; }

        .caso-actions { padding:12px 14px; border-top:1px solid var(--border); display:flex; gap:8px; }
        .btn-action {
            flex:1; padding:8px 0; border-radius:8px; border:none; cursor:pointer;
            font-size:.82rem; font-weight:600; transition:all .2s;
        }
        .btn-ver { background:rgba(212,175,55,.1); color:var(--gold); border:1px solid rgba(212,175,55,.3); }
        .btn-ver:hover { background:rgba(212,175,55,.2); }
        .btn-ocultar { background:rgba(239,68,68,.1); color:var(--red); border:1px solid rgba(239,68,68,.3); }
        .btn-ocultar:hover { background:rgba(239,68,68,.2); }
        .btn-publicar { background:rgba(34,197,94,.1); color:var(--green); border:1px solid rgba(34,197,94,.3); }
        .btn-publicar:hover { background:rgba(34,197,94,.2); }
        .btn-eliminar { background:rgba(239,68,68,.08); color:#ff6b6b; border:1px solid rgba(239,68,68,.2); }
        .btn-eliminar:hover { background:rgba(239,68,68,.18); }

        .loading { text-align:center; padding:80px 20px; color:var(--muted); font-size:1.1rem; }
        .empty { text-align:center; padding:80px 20px; color:var(--muted); }
        .empty .icon { font-size:3rem; margin-bottom:16px; }

        /* Modal edición */
        .modal-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,.85);
            z-index:1000; align-items:center; justify-content:center; padding:20px;
        }
        .modal-overlay.open { display:flex; }
        .modal {
            background:#0d1117; border:1px solid var(--border); border-radius:16px;
            padding:28px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto;
        }
        .modal h2 { font-size:1.15rem; margin-bottom:20px; color:var(--gold); }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:.82rem; color:var(--muted); margin-bottom:6px; }
        .form-group input, .form-group textarea, .form-group select {
            width:100%; padding:10px 14px; background:#0a0f1a; border:1px solid var(--border);
            border-radius:8px; color:var(--text); font-size:.9rem; font-family:'Inter',sans-serif;
        }
        .form-group textarea { resize:vertical; min-height:80px; }
        .modal-actions { display:flex; gap:10px; margin-top:20px; }
        .btn-save {
            flex:1; padding:11px; background:var(--magenta); color:#fff; border:none;
            border-radius:8px; cursor:pointer; font-weight:700; font-size:.9rem;
        }
        .btn-cancel {
            flex:1; padding:11px; background:transparent; color:var(--muted);
            border:1px solid var(--border); border-radius:8px; cursor:pointer; font-size:.9rem;
        }

        /* Toast */
        #toast {
            position:fixed; bottom:24px; right:24px; background:#1a2332; border:1px solid var(--border);
            color:var(--text); padding:12px 20px; border-radius:10px; font-size:.88rem;
            opacity:0; transform:translateY(10px); transition:all .3s; z-index:2000; pointer-events:none;
        }
        #toast.show { opacity:1; transform:translateY(0); }
        #toast.ok { border-color:var(--green); color:var(--green); }
        #toast.err { border-color:var(--red); color:var(--red); }
    </style>
</head>
<body>

<header>
    <h1>💎 PRODIGY — <span>Gestionar Casos</span></h1>
    <a class="back-link" href="agregar-caso.html">← Agregar caso</a>
</header>

<div class="toolbar">
    <div class="count-badge">Total: <strong id="totalCount">—</strong></div>
    <div class="filter-toggle">
        <button class="ftbtn active" onclick="setFiltro('todos',this)">Todos</button>
        <button class="ftbtn" onclick="setFiltro('visible',this)">Publicados</button>
        <button class="ftbtn" onclick="setFiltro('oculto',this)">Ocultos</button>
    </div>
</div>

<div class="grid" id="casosGrid">
    <div class="loading">⏳ Cargando casos...</div>
</div>

<!-- Modal edición -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2>✏️ Editar Caso</h2>
        <input type="hidden" id="editId">
        <div class="form-group">
            <label>Nombre del caso</label>
            <input type="text" id="editName">
        </div>
        <div class="form-group">
            <label>Código</label>
            <input type="text" id="editCode">
        </div>
        <div class="form-group">
            <label>Tipo</label>
            <select id="editType">
                <option value="rehabilitacion">Rehabilitación</option>
                <option value="estetica">Estética</option>
                <option value="implantes">Implantes</option>
                <option value="protesis">Prótesis</option>
                <option value="alineadores">Alineadores</option>
            </select>
        </div>
        <div class="form-group">
            <label>Fecha</label>
            <input type="text" id="editDate" placeholder="Ej: Marzo 2025">
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="editDesc"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-save" onclick="guardarEdicion()">💾 Guardar</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL  = 'https://zgihrwqfyvgyapbwzkvw.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnaWhyd3FmeXZneWFwYnd6a3Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzczNDksImV4cCI6MjA5MDg1MzM0OX0.9CzmFDQYeQKcbtAZoT1_n_OuJ1qPVJu3jImd938T634';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const escH = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let todosCasos = [];
let filtroActivo = 'todos';

// ── Toast ──────────────────────────────────────────────
function toast(msg, tipo = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + tipo;
    setTimeout(() => el.className = '', 2800);
}

// ── Cargar casos ───────────────────────────────────────
async function cargar() {
    const { data, error } = await sb
        .from('casos_portafolio')
        .select('id,name,code,type,date,description,cover_image,visible,created_at')
        .order('created_at', { ascending: false });

    if (error) {
        document.getElementById('casosGrid').innerHTML =
            '<div class="empty"><div class="icon">⚠️</div><p>Error al cargar casos.</p></div>';
        return;
    }
    todosCasos = data || [];
    document.getElementById('totalCount').textContent = todosCasos.length;
    renderGrid();
}

// ── Render ─────────────────────────────────────────────
function renderGrid() {
    const grid = document.getElementById('casosGrid');
    let lista = todosCasos;
    if (filtroActivo === 'visible') lista = lista.filter(c => c.visible);
    if (filtroActivo === 'oculto')  lista = lista.filter(c => !c.visible);

    if (!lista.length) {
        grid.innerHTML = '<div class="empty"><div class="icon">🦷</div><p>Sin casos en esta categoría.</p></div>';
        return;
    }

    grid.innerHTML = lista.map(c => {
        const thumb = c.cover_image?.startsWith('https://') ? `<img class="caso-img" src="${escH(c.cover_image)}?width=400&quality=70" alt="${escH(c.name)}" onerror="this.style.display='none'">` :
                      `<div class="caso-img-placeholder">🦷</div>`;
        const estadoBadge = c.visible
            ? `<span class="badge visible">● Publicado</span>`
            : `<span class="badge oculto">○ Oculto</span>`;
        const btnVisibilidad = c.visible
            ? `<button class="btn-action btn-ocultar" onclick="toggleVisible('${c.id}',false)">🙈 Ocultar</button>`
            : `<button class="btn-action btn-publicar" onclick="toggleVisible('${c.id}',true)">🟢 Publicar</button>`;

        return `
        <div class="caso-card ${c.visible ? '' : 'oculto'}" id="card-${c.id}">
            ${thumb}
            <div class="caso-body">
                <div class="caso-name">${escH(c.name)}</div>
                <div class="caso-meta">
                    <span class="badge">${escH(c.code) || '—'}</span>
                    <span class="badge">${escH(c.type) || '—'}</span>
                    ${estadoBadge}
                </div>
                <div class="caso-desc">${escH(c.description)}</div>
            </div>
            <div class="caso-actions">
                <button class="btn-action btn-ver" onclick="window.open('../patient?id=${c.id}','_blank')">👁 Ver</button>
                <button class="btn-action btn-ver" onclick="abrirModal('${c.id}')">✏️ Editar</button>
                ${btnVisibilidad}
                <button class="btn-action btn-eliminar" onclick="eliminarCaso('${c.id}')">🗑</button>
            </div>
        </div>`;
    }).join('');
}

// ── Filtro ─────────────────────────────────────────────
function setFiltro(f, btn) {
    filtroActivo = f;
    document.querySelectorAll('.ftbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
}

// ── Ocultar / Publicar ─────────────────────────────────
async function toggleVisible(id, nuevoEstado) {
    const { error } = await sb
        .from('casos_portafolio')
        .update({ visible: nuevoEstado })
        .eq('id', id);

    if (error) { toast('Error al actualizar', 'err'); return; }

    const caso = todosCasos.find(c => c.id === id);
    if (caso) caso.visible = nuevoEstado;
    toast(nuevoEstado ? '✅ Caso publicado' : '🙈 Caso ocultado');
    renderGrid();
}

// ── Eliminar ───────────────────────────────────────────
async function eliminarCaso(id) {
    if (!confirm('¿Eliminar este caso definitivamente? Esta acción no se puede deshacer.')) return;

    const { error } = await sb.from('casos_portafolio').delete().eq('id', id);
    if (error) { toast('Error al eliminar', 'err'); return; }

    todosCasos = todosCasos.filter(c => c.id !== id);
    document.getElementById('totalCount').textContent = todosCasos.length;
    toast('🗑 Caso eliminado');
    renderGrid();
}

// ── Modal edición ──────────────────────────────────────
function abrirModal(id) {
    const c = todosCasos.find(x => x.id === id);
    if (!c) return;
    document.getElementById('editId').value   = c.id;
    document.getElementById('editName').value  = c.name || '';
    document.getElementById('editCode').value  = c.code || '';
    document.getElementById('editDate').value  = c.date || '';
    document.getElementById('editDesc').value  = c.description || '';
    const sel = document.getElementById('editType');
    sel.value = c.type || 'rehabilitacion';
    document.getElementById('modalOverlay').classList.add('open');
}

function cerrarModal() {
    document.getElementById('modalOverlay').classList.remove('open');
}

async function guardarEdicion() {
    const id   = document.getElementById('editId').value;
    const data = {
        name:        document.getElementById('editName').value.trim(),
        code:        document.getElementById('editCode').value.trim(),
        type:        document.getElementById('editType').value,
        date:        document.getElementById('editDate').value.trim(),
        description: document.getElementById('editDesc').value.trim(),
    };

    if (!data.name) { toast('El nombre es obligatorio', 'err'); return; }

    const { error } = await sb.from('casos_portafolio').update(data).eq('id', id);
    if (error) { toast('Error al guardar', 'err'); return; }

    const caso = todosCasos.find(c => c.id === id);
    if (caso) Object.assign(caso, data);
    cerrarModal();
    toast('✅ Caso actualizado');
    renderGrid();
}

// Cerrar modal al hacer clic fuera
document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
});

// ── Auth guard ─────────────────────────────────────────
(async function() {
    const session = await ProdigyAuth.require('admin');
    if (!session) return;
    cargar();
})();
</script>
</body>
</html>
