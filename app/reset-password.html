<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>PRODIGY — Nueva Contraseña</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #050505;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(217,70,166,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(0,210,255,0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        .card {
            background: linear-gradient(160deg, #0d1525 0%, #080f1c 100%);
            border-radius: 22px;
            padding: 40px 36px;
            width: 100%; max-width: 420px;
            box-shadow: 0 0 0 1.5px rgba(217,70,166,0.5),
                        0 0 0 3px rgba(212,175,55,0.15),
                        0 24px 80px rgba(0,0,0,0.7);
            position: relative; z-index: 1;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%; height: 2px;
            background: linear-gradient(90deg, transparent, #D946A6, #D4AF37, #D946A6, transparent);
            border-radius: 2px;
        }
        @keyframes diamondFloat {
            0%, 100% { transform: translateY(0px) rotate(-2deg); }
            50%       { transform: translateY(-8px) rotate(2deg); }
        }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo-icon {
            width: 72px; height: 72px; font-size: 2rem;
            background: radial-gradient(circle, rgba(217,70,166,0.18) 0%, rgba(212,175,55,0.08) 100%);
            border-radius: 50%; border: 2px solid rgba(217,70,166,0.5);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px;
            animation: diamondFloat 3s ease-in-out infinite;
            box-shadow: 0 8px 30px rgba(217,70,166,0.25);
        }
        .logo h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: 3px; }
        .logo p   { font-size: 0.74rem; color: #64748b; margin-top: 4px; }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; font-size: 0.74rem; font-weight: 700;
            color: #94a3b8; margin-bottom: 5px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%; padding: 11px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #fff; font-size: 0.91rem;
            outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #D946A6; }

        @keyframes btnShimmer {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .btn-submit {
            width: 100%; padding: 14px;
            background: linear-gradient(90deg, #D946A6 0%, #B82F8B 40%, #D4AF37 70%, #D946A6 100%);
            background-size: 200% auto;
            color: #fff; border: none; border-radius: 10px;
            font-size: 0.95rem; font-weight: 800;
            cursor: pointer; margin-top: 8px;
            animation: btnShimmer 2.5s linear infinite;
            box-shadow: 0 4px 18px rgba(217,70,166,0.35);
        }
        .btn-submit:hover { animation: none; opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; animation: none; }

        #msg-box {
            border-radius: 8px; padding: 10px 12px;
            font-size: 0.82rem; margin-bottom: 14px; display: none;
        }
        .msg-ok  { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.35); color: #86efac; }
        .msg-err { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.35);  color: #f87171; }

        .pwd-req {
            font-size: 0.7rem; color: #64748b;
            margin-top: 5px; line-height: 1.6;
        }
        .pwd-req span { display: inline-block; margin-right: 10px; }
        .pwd-req span.ok { color: #00FF41; }
        .back { display:block;text-align:center;margin-top:18px;font-size:0.77rem;color:#64748b;text-decoration:none; }
        .back:hover { color: #D4AF37; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">💎</div>
        <h1>PRODIGY</h1>
        <p>Restablecer contraseña</p>
    </div>

    <div id="msg-box"></div>

    <div id="form-area">
        <div class="form-group">
            <label>Nueva contraseña</label>
            <input type="password" id="new-pass" placeholder="Mínimo 8 caracteres" minlength="8"
                oninput="checkReqs(this.value)">
            <div class="pwd-req">
                <span id="req-len">✗ 8+ caracteres</span>
                <span id="req-num">✗ 1 número</span>
                <span id="req-cap">✗ 1 mayúscula</span>
            </div>
        </div>
        <div class="form-group">
            <label>Confirmar contraseña</label>
            <input type="password" id="confirm-pass" placeholder="Repite la contraseña">
        </div>
        <button class="btn-submit" id="btn-save" onclick="savePassword()">
            <i class="fas fa-lock"></i> &nbsp;Guardar nueva contraseña
        </button>
    </div>

    <a href="login.html" class="back"><i class="fas fa-arrow-left"></i> Volver al inicio de sesión</a>
</div>

<script>
    const SUPABASE_URL  = 'https://zgihrwqfyvgyapbwzkvw.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnaWhyd3FmeXZneWFwYnd6a3Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzczNDksImV4cCI6MjA5MDg1MzM0OX0.9CzmFDQYeQKcbtAZoT1_n_OuJ1qPVJu3jImd938T634';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    function showMsg(text, type) {
        const el = document.getElementById('msg-box');
        el.className = 'msg-box ' + (type === 'ok' ? 'msg-ok' : 'msg-err');
        el.style.display = 'block';
        const icon = document.createElement('i');
        icon.className = 'fas fa-' + (type === 'ok' ? 'check-circle' : 'circle-exclamation');
        el.innerHTML = '';
        el.appendChild(icon);
        el.appendChild(document.createTextNode(' ' + text));
    }

    function checkReqs(val) {
        const len = document.getElementById('req-len');
        const num = document.getElementById('req-num');
        const cap = document.getElementById('req-cap');
        len.textContent = (val.length >= 8 ? '✓' : '✗') + ' 8+ caracteres';
        len.className   = val.length >= 8 ? 'ok' : '';
        num.textContent = (/\d/.test(val) ? '✓' : '✗') + ' 1 número';
        num.className   = /\d/.test(val) ? 'ok' : '';
        cap.textContent = (/[A-Z]/.test(val) ? '✓' : '✗') + ' 1 mayúscula';
        cap.className   = /[A-Z]/.test(val) ? 'ok' : '';
    }

    async function savePassword() {
        const pass    = document.getElementById('new-pass').value;
        const confirm = document.getElementById('confirm-pass').value;
        const btn     = document.getElementById('btn-save');

        if (pass.length < 8)        { showMsg('La contraseña debe tener al menos 8 caracteres.', 'err'); return; }
        if (!/\d/.test(pass))       { showMsg('Agrega al menos un número.', 'err'); return; }
        if (!/[A-Z]/.test(pass))    { showMsg('Agrega al menos una mayúscula.', 'err'); return; }
        if (pass !== confirm)       { showMsg('Las contraseñas no coinciden.', 'err'); return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> &nbsp;Guardando...';

        const { error } = await sb.auth.updateUser({ password: pass });
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-lock"></i> &nbsp;Guardar nueva contraseña';

        if (error) {
            showMsg('No se pudo actualizar: ' + (error.message || 'enlace expirado. Solicita uno nuevo.'), 'err');
        } else {
            showMsg('¡Contraseña actualizada! Redirigiendo...', 'ok');
            document.getElementById('form-area').style.opacity = '0.4';
            document.getElementById('form-area').style.pointerEvents = 'none';
            setTimeout(() => window.location.href = 'login.html', 2200);
        }
    }

    // Verificar que el usuario llegó con un token válido de Supabase
    sb.auth.onAuthStateChange((event) => {
        if (event === 'PASSWORD_RECOVERY') {
            // Token válido — el usuario puede cambiar su contraseña
        } else if (event === 'SIGNED_OUT') {
            showMsg('Enlace inválido o expirado. Solicita un nuevo link desde login.', 'err');
            document.getElementById('form-area').style.display = 'none';
        }
    });
</script>
</body>
</html>
