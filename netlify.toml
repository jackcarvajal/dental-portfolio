# ============================================================
# PRODIGY LAB DENTAL — Netlify Configuration
# Sitio estático: no hay build step, publish = raíz del repo
# ============================================================

[build]
  publish = "."          # carpeta raíz (donde está index.html)
  # command = ""         # sin build — todo es HTML/CSS/JS puro

# ── Contextos de entorno ─────────────────────────────────────
[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "development" }

# ── REDIRECTS ────────────────────────────────────────────────

# 1) Bloquear acceso a archivos sensibles (SQL, Supabase config, bat)
[[redirects]]
  from   = "/sql/*"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/supabase/*"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/*.bat"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/*.md"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/PENDIENTES.md"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/PRODIGY_LOG.md"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/CLAUDE.md"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/SESIONES.md"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/package*.json"
  to     = "/404.html"
  status = 404
  force  = true

# 2) Bloquear acceso a paneles internos de app (sin forzar — el auth-guard JS redirige)
[[redirects]]
  from   = "/app/mensajero.html"
  to     = "/app/login.html"
  status = 302
  conditions = { Cookie = ["sb-*"] }

# 3) Página 404 personalizada (catch-all)
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# ── HEADERS DE SEGURIDAD ─────────────────────────────────────
# Se aplican a todas las páginas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    # Content Security Policy — ajusta si agregas nuevos CDNs
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval'
        https://cdnjs.cloudflare.com
        https://cdn.jsdelivr.net
        https://zgihrwqfyvgyapbwzkvw.supabase.co;
      style-src 'self' 'unsafe-inline'
        https://cdnjs.cloudflare.com
        https://fonts.googleapis.com;
      font-src 'self'
        https://cdnjs.cloudflare.com
        https://fonts.gstatic.com;
      img-src 'self' data: blob:
        https://*.supabase.co
        https://images.unsplash.com;
      connect-src 'self'
        https://zgihrwqfyvgyapbwzkvw.supabase.co
        https://*.supabase.co
        wss://zgihrwqfyvgyapbwzkvw.supabase.co;
      frame-src https://www.youtube.com;
      object-src 'none';
      base-uri 'self';
    """

# Cache agresivo para assets estáticos (JS, CSS, imágenes)
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# HTML: sin cache (siempre fresco)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
