<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000d1a"/>
      <stop offset="100%" style="stop-color:#001a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(0,210,255,0.15)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Circuit lines -->
  <line x1="200" y1="315" x2="500" y2="315" stroke="rgba(0,210,255,0.2)" stroke-width="2"/>
  <line x1="700" y1="315" x2="1000" y2="315" stroke="rgba(0,210,255,0.2)" stroke-width="2"/>
  <line x1="600" y1="100" x2="600" y2="250" stroke="rgba(0,210,255,0.2)" stroke-width="2"/>
  <line x1="600" y1="380" x2="600" y2="530" stroke="rgba(0,210,255,0.2)" stroke-width="2"/>
  <!-- Circuit nodes -->
  <circle cx="500" cy="315" r="6" fill="rgba(0,210,255,0.4)" stroke="rgba(0,210,255,0.6)" stroke-width="2"/>
  <circle cx="700" cy="315" r="6" fill="rgba(0,210,255,0.4)" stroke="rgba(0,210,255,0.6)" stroke-width="2"/>
  <circle cx="600" cy="250" r="6" fill="rgba(0,210,255,0.4)" stroke="rgba(0,210,255,0.6)" stroke-width="2"/>
  <circle cx="600" cy="380" r="6" fill="rgba(0,210,255,0.4)" stroke="rgba(0,210,255,0.6)" stroke-width="2"/>
  <!-- Central hexagon -->
  <polygon points="600,200 668,240 668,320 600,360 532,320 532,240" fill="rgba(0,210,255,0.06)" stroke="rgba(0,210,255,0.3)" stroke-width="2"/>
  <polygon points="600,230 648,257 648,311 600,338 552,311 552,257" fill="rgba(0,210,255,0.08)" stroke="rgba(0,210,255,0.2)" stroke-width="1"/>
  <!-- Glow -->
  <circle cx="600" cy="280" r="60" fill="rgba(0,210,255,0.08)"/>
  <!-- Scan lines -->
  <rect x="520" y="270" width="160" height="2" fill="rgba(0,210,255,0.4)"/>
  <rect x="540" y="290" width="120" height="1" fill="rgba(0,210,255,0.2)"/>
  <rect x="560" y="300" width="80" height="1" fill="rgba(0,210,255,0.15)"/>
  <!-- Label -->
  <rect x="80" y="60" width="210" height="40" rx="20" fill="rgba(0,210,255,0.1)" stroke="rgba(0,210,255,0.3)" stroke-width="1"/>
  <text x="185" y="86" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#00d2ff" text-anchor="middle" letter-spacing="2">TECNOLOGÍA</text>
  <line x1="80" y1="580" x2="200" y2="580" stroke="rgba(0,210,255,0.4)" stroke-width="2"/>
  <text x="80" y="600" font-family="system-ui,sans-serif" font-size="14" fill="rgba(0,210,255,0.5)" letter-spacing="3">PRODIGY LAB DENTAL</text>
</svg>