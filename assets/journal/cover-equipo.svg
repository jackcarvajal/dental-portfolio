<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080012"/>
      <stop offset="100%" style="stop-color:#0f001e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <pattern id="dots" width="35" height="35" patternUnits="userSpaceOnUse">
    <circle cx="17" cy="17" r="1" fill="rgba(167,139,250,0.1)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Gear large -->
  <circle cx="600" cy="315" r="110" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="3"/>
  <circle cx="600" cy="315" r="85" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.2)" stroke-width="2"/>
  <circle cx="600" cy="315" r="45" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="2"/>
  <!-- Gear teeth -->
  <g fill="none" stroke="rgba(167,139,250,0.3)" stroke-width="12" stroke-linecap="round">
    <line x1="600" y1="195" x2="600" y2="210"/>
    <line x1="600" y1="420" x2="600" y2="435"/>
    <line x1="480" y1="315" x2="495" y2="315"/>
    <line x1="705" y1="315" x2="720" y2="315"/>
    <line x1="517" y1="232" x2="527" y2="249"/>
    <line x1="673" y1="381" x2="683" y2="398"/>
    <line x1="517" y1="398" x2="527" y2="381"/>
    <line x1="673" y1="249" x2="683" y2="232"/>
  </g>
  <!-- Small gear -->
  <circle cx="760" cy="200" r="55" fill="none" stroke="rgba(167,139,250,0.1)" stroke-width="2"/>
  <circle cx="760" cy="200" r="40" fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <circle cx="760" cy="200" r="18" fill="rgba(167,139,250,0.08)"/>
  <!-- Center dot -->
  <circle cx="600" cy="315" r="15" fill="rgba(167,139,250,0.4)" stroke="rgba(167,139,250,0.7)" stroke-width="2"/>
  <!-- Label -->
  <rect x="80" y="60" width="145" height="40" rx="20" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="152" y="86" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="2">EQUIPOS</text>
  <line x1="80" y1="580" x2="200" y2="580" stroke="rgba(167,139,250,0.4)" stroke-width="2"/>
  <text x="80" y="600" font-family="system-ui,sans-serif" font-size="14" fill="rgba(167,139,250,0.5)" letter-spacing="3">PRODIGY LAB DENTAL</text>
</svg>