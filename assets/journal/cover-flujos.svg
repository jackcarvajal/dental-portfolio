<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0015"/>
      <stop offset="100%" style="stop-color:#1a0028"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(217,70,166,0.06)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Flow nodes -->
  <circle cx="240" cy="315" r="50" fill="rgba(217,70,166,0.12)" stroke="rgba(217,70,166,0.4)" stroke-width="2"/>
  <circle cx="440" cy="315" r="50" fill="rgba(217,70,166,0.12)" stroke="rgba(217,70,166,0.4)" stroke-width="2"/>
  <circle cx="640" cy="315" r="50" fill="rgba(217,70,166,0.18)" stroke="rgba(217,70,166,0.6)" stroke-width="2"/>
  <circle cx="840" cy="315" r="50" fill="rgba(217,70,166,0.12)" stroke="rgba(217,70,166,0.4)" stroke-width="2"/>
  <circle cx="1000" cy="315" r="50" fill="rgba(217,70,166,0.12)" stroke="rgba(217,70,166,0.4)" stroke-width="2"/>
  <!-- Arrows between nodes -->
  <line x1="295" y1="315" x2="385" y2="315" stroke="rgba(217,70,166,0.5)" stroke-width="2"/>
  <polygon points="385,308 395,315 385,322" fill="rgba(217,70,166,0.7)"/>
  <line x1="495" y1="315" x2="585" y2="315" stroke="rgba(217,70,166,0.5)" stroke-width="2"/>
  <polygon points="585,308 595,315 585,322" fill="rgba(217,70,166,0.7)"/>
  <line x1="695" y1="315" x2="785" y2="315" stroke="rgba(217,70,166,0.5)" stroke-width="2"/>
  <polygon points="785,308 795,315 785,322" fill="rgba(217,70,166,0.7)"/>
  <line x1="895" y1="315" x2="945" y2="315" stroke="rgba(217,70,166,0.5)" stroke-width="2"/>
  <polygon points="945,308 955,315 945,322" fill="rgba(217,70,166,0.7)"/>
  <!-- Node numbers -->
  <text x="240" y="322" font-family="system-ui,sans-serif" font-size="22" font-weight="900" fill="rgba(217,70,166,0.9)" text-anchor="middle">1</text>
  <text x="440" y="322" font-family="system-ui,sans-serif" font-size="22" font-weight="900" fill="rgba(217,70,166,0.9)" text-anchor="middle">2</text>
  <text x="640" y="322" font-family="system-ui,sans-serif" font-size="22" font-weight="900" fill="#D946A6" text-anchor="middle">3</text>
  <text x="840" y="322" font-family="system-ui,sans-serif" font-size="22" font-weight="900" fill="rgba(217,70,166,0.9)" text-anchor="middle">4</text>
  <text x="1000" y="322" font-family="system-ui,sans-serif" font-size="22" font-weight="900" fill="rgba(217,70,166,0.9)" text-anchor="middle">5</text>
  <!-- Glow on center node -->
  <circle cx="640" cy="315" r="80" fill="rgba(217,70,166,0.06)"/>
  <!-- Label -->
  <rect x="80" y="60" width="165" height="40" rx="20" fill="rgba(217,70,166,0.1)" stroke="rgba(217,70,166,0.3)" stroke-width="1"/>
  <text x="162" y="86" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#D946A6" text-anchor="middle" letter-spacing="2">FLUJOS CAD</text>
  <line x1="80" y1="580" x2="200" y2="580" stroke="rgba(217,70,166,0.4)" stroke-width="2"/>
  <text x="80" y="600" font-family="system-ui,sans-serif" font-size="14" fill="rgba(217,70,166,0.5)" letter-spacing="3">PRODIGY LAB DENTAL</text>
</svg>