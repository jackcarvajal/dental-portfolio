<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#F4C430"/>
      <stop offset="100%" style="stop-color:#D946A6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="30%" style="stop-color:#D4AF37"/>
      <stop offset="70%" style="stop-color:#D946A6"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#D4AF37" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top gold border line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#lineGrad)"/>

  <!-- Diamond icon top center -->
  <text x="600" y="140" text-anchor="middle" font-size="52" filter="url(#glow)">💎</text>

  <!-- PRODIGY main text -->
  <text x="600" y="280"
        text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="108"
        letter-spacing="18"
        fill="url(#goldGrad)"
        filter="url(#glowStrong)">PRODIGY</text>

  <!-- Separator line -->
  <rect x="300" y="305" width="600" height="2" fill="url(#lineGrad)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="600" y="365"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-weight="400"
        font-size="26"
        letter-spacing="8"
        fill="#f5f5f7"
        opacity="0.9">DIGITAL DENTAL EXCELLENCE</text>

  <!-- Sub-tagline -->
  <text x="600" y="415"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="17"
        letter-spacing="2"
        fill="#94a3b8">Diseño CAD/CAM Global · Fresado &amp; Impresión 3D · Bogotá, Colombia</text>

  <!-- Bottom info bar -->
  <rect x="0" y="556" width="1200" height="74" fill="rgba(212,175,55,0.06)"/>
  <rect x="0" y="556" width="1200" height="1" fill="url(#lineGrad)" opacity="0.4"/>

  <!-- Email -->
  <text x="280" y="597"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="15"
        fill="#D4AF37">✉ labdentalprodigy@gmail.com</text>

  <!-- Divider -->
  <line x1="430" y1="572" x2="430" y2="612" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>

  <!-- Instagram -->
  <text x="600" y="597"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="15"
        fill="#D946A6">● @prodigydigitaldentistry</text>

  <!-- Divider -->
  <line x1="770" y1="572" x2="770" y2="612" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>

  <!-- Location -->
  <text x="920" y="597"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="15"
        fill="#94a3b8">📍 Bogotá, Colombia · 2026</text>

  <!-- Bottom gold border -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#lineGrad)"/>
</svg>
