let catActual = 'todos';

function filtrar(cat, btn) {
    catActual = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
}

function renderGrid() {
    const grid = document.getElementById('matGrid');
    const lista = catActual === 'todos'
        ? MATERIALES
        : MATERIALES.filter(m => m.cats.includes(catActual));

    grid.innerHTML = lista.map((m, i) => `
        <div class="mat-card" style="transition-delay:${i * 60}ms" data-cats="${m.cats.join(' ')}">
            <div class="mat-header">
                <div class="mat-icon ${m.iconClass}">${m.icon}</div>
                <div class="mat-badges">
                    ${m.badges.map(b => `<span class="badge ${b.cls}">${b.label}</span>`).join('')}
                </div>
            </div>
            <div class="mat-body">
                <div class="mat-name">${m.nombre}</div>
                <div class="mat-subtitle">${m.subtitulo}</div>
                <p class="mat-desc">${m.desc}</p>
                <div class="mat-props">
                    ${m.props.map(p => `<span class="prop-tag">${p}</span>`).join('')}
                </div>
                <div class="mat-indicaciones">
                    <h4>Indicaciones clínicas</h4>
                    <ul>${m.indicaciones.map(ind => `<li>${ind}</li>`).join('')}</ul>
                </div>
            </div>
        </div>
    `).join('');

    // Animación de entrada
    requestAnimationFrame(() => {
        grid.querySelectorAll('.mat-card').forEach(card => {
            setTimeout(() => card.classList.add('revealed'), 10);
        });
    });
}

renderGrid();
